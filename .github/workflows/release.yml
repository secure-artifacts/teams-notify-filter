name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Extension
        run: |
          mkdir -p dist
          cp manifest.json dist/
          cp background.js dist/
          cp content.js dist/
          cp popup.html dist/
          cp popup.css dist/
          cp popup.js dist/
          cd dist
          zip -r ../teams-notify-filter-${{ github.ref_name }}.zip .

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
