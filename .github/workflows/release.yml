name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Extension
        run: |
          mkdir -p dist
          cp \
            manifest.json \
            background.js \
            content.js \
            content-frame.js \
            inject.js \
            title-utils.js \
            teams-groups.js \
            teams-nav.js \
            teams-invite-resolver.js \
            teams-invite-join-page.js \
            teams-link-handler.js \
            teams-link-page.js \
            teams-panel.js \
            teams-panel.css \
            dist/
          cd dist
          zip -r ../teams-notify-filter-${{ github.ref_name }}.zip .

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
