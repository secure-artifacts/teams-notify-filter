<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams 通知过滤器</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Teams 通知过滤器</h1>

    <label class="row">
      <input id="enabled" type="checkbox" />
      <span>启用插件</span>
    </label>

    <section class="card">
      <p class="hint">
        请在 Teams 页面右下角点击 <strong>「通知管理」</strong>，把需要提醒的群组移入
        <strong>通知文件夹</strong>。私人消息始终通知，其他群组默认不通知。
      </p>
      <p id="notifyCount" class="meta">通知文件夹：0 个群组</p>
    </section>

    <button id="openTeamsBtn" type="button" class="secondary">打开 Teams 并显示管理面板</button>
    <p id="monitorStatus" class="meta">正在检查监听状态…</p>

    <button id="saveBtn" type="button">保存设置</button>
    <p id="status" class="status" hidden></p>

    <footer>
      <p>插件会自动拦截 Teams 网页原生通知，并按你的规则由扩展统一提醒。</p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
