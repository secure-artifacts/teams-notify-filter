<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams 通知过滤器</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Teams 通知过滤器</h1>

    <label class="row">
      <input id="enabled" type="checkbox" />
      <span>启用插件</span>
    </label>

    <section class="card">
      <p class="hint">
        请在 Teams 页面<strong>右侧边栏</strong>管理通知。若列表为空，在 Teams 里点开一个群聊后点「添加当前聊天」。
      </p>
      <p id="notifyCount" class="meta">通知文件夹：0 个群组</p>
    </section>

    <button id="openTeamsBtn" type="button" class="secondary">切换到 Teams 并显示右侧边栏</button>
    <p id="monitorStatus" class="meta">正在检查监听状态…</p>

    <button id="saveBtn" type="button">保存设置</button>
    <p id="status" class="status" hidden></p>

    <footer>
      <p>插件会自动拦截 Teams 网页原生通知，并按你的规则由扩展统一提醒。</p>
      <p id="braveHint" class="meta brave-hint" hidden>
        <strong>Brave 用户：</strong>若反复要求登录，请在 Teams 页（teams.live.com）点狮子图标 →
        <strong>关闭 Shields</strong> 或允许 Cookie，并对 login.live.com 同样设置。
      </p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
